services:
  - type: web
    name: backend-fastapi
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: COMPUTE_BACKEND
        value: local
      - key: STORAGE_BACKEND
        value: local
      - key: ENABLE_DEMO_FALLBACK
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PUBLIC_API_BASE
        sync: false
